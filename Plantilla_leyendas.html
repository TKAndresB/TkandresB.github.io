
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Título de la Historia</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <button class="btn-atras" onclick="window.history.back()">⬅️ Atrás</button>
        <h1>Título de la Historia</h1>
    </header>

    <main>
        <section class="historia-container">
            <img src="portada.jpg" alt="Portada de la historia" class="portada">
            
            <div class="botones">
                <button onclick="window.open('historia.pdf')">📄 Descargar PDF</button>
                <button onclick="window.open('https://youtube.com/playlist?list=historia', '_blank')">🎧 Escuchar Podcast</button>
            </div>

            <article class="contenido">
                <h2>Introducción</h2>
                <p>Aquí va la introducción de la historia...</p>

                <h2>Historia Completa</h2>
                <p>Texto completo de la leyenda o mito...</p>
            </article>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Raíces y Letras</p>
    </footer>

    <style>
        .btn-atras {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 10px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn-atras:hover {
            background-color: #555;
        }
    </style>

</body>
</html>
